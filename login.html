<!DOCTYPE html>
<html>

<head>
    <title>Admin Login</title>

    <style>

        body{
            font-family: Arial;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .container{
            background:white;
            padding:40px;
            width:350px;
            border-radius:15px;
            text-align:center;
        }

        h1{
            margin-bottom:30px;
            color:#0f172a;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Admin Login</h1>

        <form action="/login" method="POST">

            <input type="text"
                   name="username"
                   placeholder="Enter Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Enter Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
